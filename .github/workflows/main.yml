name: CI/CD Pipeline for Shop-Sync Gateway

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: shop-sync-repo
  IMAGE_NAME: shop-sync-api
  SERVICE_NAME: shop-sync-api
  REGION: us-central1

jobs:
  build-and-test:
    name: Lint, Type-Check, and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run ESLint
      run: npm run lint --if-present

    - name: Run TypeScript Compiler (Type-check)
      run: npx tsc --noEmit

    - name: Run Vitest Unit Tests
      run: npm test

  deploy-to-gcp:
    name: Build Docker Image and Deploy to Cloud Run
    needs: build-and-test
    # Only deploy on pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: actions/checkout@v4

    # 1. Authenticate to Google Cloud using a Service Account JSON Key
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # 2. Setup Docker for Artifact Registry (GCR is deprecated, GAR is the modern standard)
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
      
    - name: 'Docker Auth'
      run: |-
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

    # 3. Build and Push the Docker Image
    - name: 'Build and Push Container'
      run: |-
        DOCKER_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        docker build -t "${DOCKER_TAG}" .
        docker push "${DOCKER_TAG}"

    # 4. Deploy to Google Cloud Run
    - name: 'Deploy to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.SERVICE_NAME }}'
        region: '${{ env.REGION }}'
        image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
        env_vars: |
          PORT=3001
          DATABASE_URL=${{ secrets.NEON_DATABASE_URL }}
        flags: '--allow-unauthenticated'

    # 5. Output the Cloud Run URL
    - name: 'Show Deployment URL'
      run: echo "Deployed URL - ${{ steps.deploy.outputs.url }}"
